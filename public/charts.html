  <meta name="apple-mobile-web-app-title" content="Trade MCP Charts" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- TradingView Lightweight Charts v4 -->
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="charts.css">
</head>
<body>

  <!-- Header -->
  <header class="charts-header">
    <div class="header-left">
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
        <span>trade-mcp</span>
      </a>
      <span class="header-divider">|</span>
      <span class="header-title">Live Charts</span>
    </div>
    <div class="header-right">
      <div class="status-dot blinking"></div>
      <span class="status-label">LIVE</span>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="charts-layout">

    <!-- Left: Symbol Search + Watchlist -->
    <aside class="sidebar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="symbol-input" placeholder="Search symbol (AAPL, TCS.NS...)" autocomplete="off" />
        <button id="search-btn" class="search-go-btn">Go</button>
      </div>
      <div id="search-suggestions" class="suggestions-list hidden"></div>

      <!-- Watchlist -->
      <div class="watchlist-header">Watchlist</div>
      <div class="watchlist" id="watchlist"></div>
    </aside>

    <!-- Center + Right: Chart Area -->
    <main class="chart-main">

      <!-- Stock Info Bar -->
      <div class="stock-info-bar" id="stock-info-bar">
        <div class="sib-symbol" id="sib-symbol">AAPL</div>
        <div class="sib-name" id="sib-name">Apple Inc.</div>
        <div class="sib-price-block">
          <span class="sib-price" id="sib-price">—</span>
          <span class="sib-change" id="sib-change">—</span>
        </div>
        <div class="sib-stats">
          <div class="sib-stat"><span class="sib-stat-label">Open</span><span id="sib-open">—</span></div>
          <div class="sib-stat"><span class="sib-stat-label">High</span><span id="sib-high">—</span></div>
          <div class="sib-stat"><span class="sib-stat-label">Low</span><span id="sib-low">—</span></div>
          <div class="sib-stat"><span class="sib-stat-label">52W High</span><span id="sib-52h">—</span></div>
          <div class="sib-stat"><span class="sib-stat-label">52W Low</span><span id="sib-52l">—</span></div>
          <div class="sib-stat"><span class="sib-stat-label">Volume</span><span id="sib-vol">—</span></div>
        </div>
      </div>

      <!-- Toolbar: Timeframes + Chart Type + Indicators -->
      <div class="chart-toolbar">
        <div class="toolbar-left">
          <div class="timeframe-group">
            <button class="tf-btn" data-range="1d" data-interval="5m">1D</button>
            <button class="tf-btn" data-range="5d" data-interval="15m">5D</button>
            <button class="tf-btn" data-range="1mo" data-interval="1h">1M</button>
            <button class="tf-btn active" data-range="3mo" data-interval="1d">3M</button>
            <button class="tf-btn" data-range="6mo" data-interval="1d">6M</button>
            <button class="tf-btn" data-range="1y" data-interval="1d">1Y</button>
            <button class="tf-btn" data-range="2y" data-interval="1wk">2Y</button>
          </div>
          <div class="chart-type-group">
            <button class="ct-btn active" data-type="candlestick" title="Candlestick">
              <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><rect x="3" y="5" width="4" height="8" rx="1"/><line x1="5" y1="2" x2="5" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="13" x2="5" y2="18" stroke="currentColor" stroke-width="1.5"/><rect x="13" y="7" width="4" height="6" rx="1" fill="var(--accent-green)"/><line x1="15" y1="4" x2="15" y2="7" stroke="var(--accent-green)" stroke-width="1.5"/><line x1="15" y1="13" x2="15" y2="17" stroke="var(--accent-green)" stroke-width="1.5"/></svg>
              Candle
            </button>
            <button class="ct-btn" data-type="line" title="Line Chart">
              <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,15 6,10 10,12 14,6 18,9"/></svg>
              Line
            </button>
            <button class="ct-btn" data-type="area" title="Area Chart">
              <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,15 6,10 10,12 14,6 18,9"/><polygon points="2,15 6,10 10,12 14,6 18,9 18,18 2,18" fill="rgba(10,132,255,0.2)" stroke="none"/></svg>
              Area
            </button>
          </div>
        </div>
        <div class="toolbar-right indicators-toggle-group">
          <span class="indicator-label">Indicators:</span>
          <label class="ind-toggle"><input type="checkbox" id="toggle-ema9" checked> <span>EMA 9</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-ema21" checked> <span>EMA 21</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-sma50"> <span>SMA 50</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-sma200"> <span>SMA 200</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-bb"> <span>BB</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-vol" checked> <span>Volume</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-rsi" checked> <span>RSI</span></label>
          <label class="ind-toggle"><input type="checkbox" id="toggle-macd" checked> <span>MACD</span></label>
        </div>
      </div>

      <!-- Loading Overlay -->
      <div id="chart-loading" class="chart-loading">
        <div class="loading-spinner"></div>
        <p>Fetching market data...</p>
      </div>

      <!-- Main Candlestick / Line Chart -->
      <div class="chart-pane-wrapper">
        <div class="chart-pane-label">Price</div>
        <div id="main-chart" class="chart-pane main-pane"></div>
      </div>

      <!-- Volume Pane -->
      <div class="chart-pane-wrapper" id="vol-pane-wrapper">
        <div class="chart-pane-label">Volume</div>
        <div id="vol-chart" class="chart-pane vol-pane"></div>
      </div>

      <!-- RSI Pane -->
      <div class="chart-pane-wrapper" id="rsi-pane-wrapper">
        <div class="chart-pane-label">RSI (14)</div>
        <div id="rsi-chart" class="chart-pane indicator-pane"></div>
      </div>

      <!-- MACD Pane -->
      <div class="chart-pane-wrapper" id="macd-pane-wrapper">
        <div class="chart-pane-label">MACD (12, 26, 9)</div>
        <div id="macd-chart" class="chart-pane indicator-pane"></div>
      </div>

    </main>
  </div>

  <script src="charts.js"></script>
</body>
</html>
